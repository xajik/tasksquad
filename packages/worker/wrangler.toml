name = "tasksquad-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# D1
[[d1_databases]]
binding       = "DB"
database_name = "tasksquad-db"
database_id   = "172c2b3e-3547-45e5-8a58-fa5e73b4e63d"

# R2
[[r2_buckets]]
binding     = "LOGS"
bucket_name = "tasksquad-logs"

# KV — Firebase JWKS cache
[[kv_namespaces]]
binding = "JWKS_CACHE"
id      = "2fd5d9c6fb734e07940c1d825c7d1411"

# Durable Objects
[[durable_objects.bindings]]
name       = "AGENT_RELAY"
class_name = "AgentRelay"

[[migrations]]
tag         = "v1"
new_classes = ["AgentRelay"]

[observability]
enabled = true

[vars]
# Public vars (non-sensitive) — override per environment if needed.
CLOUDFLARE_ACCOUNT_ID = "your-account-id"
R2_BUCKET_NAME        = "tasksquad-logs"

# Secrets — set via: npx wrangler secret put <KEY>
# FIREBASE_PROJECT_ID          tasksquad-e1442
# FIREBASE_SERVICE_ACCOUNT_KEY base64-encoded Firebase service account JSON
# DAEMON_SECRET                shared secret for X-TSQ-Token validation
# R2_ACCESS_KEY_ID             R2 API token key ID  (for presigned PUT URLs)
# R2_SECRET_ACCESS_KEY         R2 API token secret  (for presigned PUT URLs)
