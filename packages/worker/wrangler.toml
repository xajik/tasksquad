name = "tasksquad-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# D1
[[d1_databases]]
binding         = "DB"
database_name   = "tasksquad-db"
database_id     = "172c2b3e-3547-45e5-8a58-fa5e73b4e63d"
migrations_dir  = "migrations"

# R2
[[r2_buckets]]
binding     = "LOGS"
bucket_name = "tasksquad-logs"

# KV — Firebase JWKS cache
[[kv_namespaces]]
binding = "JWKS_CACHE"
id      = "2fd5d9c6fb734e07940c1d825c7d1411"

# KV — inbox version counter for ETag/cache-control on daemon polling
# Provision with: wrangler kv namespace create POLL_CACHE
[[kv_namespaces]]
binding = "POLL_CACHE"
id      = "60e989c16f6d4ce4946df7393a6031ce"

# Durable Objects
[[durable_objects.bindings]]
name       = "AGENT_RELAY"
class_name = "AgentRelay"

[[migrations]]
tag         = "v1"
new_classes = ["AgentRelay"]

[triggers]
crons = ["* * * * *"]

[observability]
enabled = true

# CORS — set to a comma-separated list of allowed origins
# e.g. "https://tasksquad.ai,http://localhost:5173"
# Configure via: wrangler secret put ALLOWED_ORIGINS
# [vars]
# ALLOWED_ORIGINS = ""
