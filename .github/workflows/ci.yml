name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-daemon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: make test
        working-directory: packages/daemon

  test-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: make install
        working-directory: packages/portal
      - run: make test
        working-directory: packages/portal

  test-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: make install
        working-directory: packages/worker
      - run: make test
        working-directory: packages/worker
