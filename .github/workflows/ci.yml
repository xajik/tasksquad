name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-daemon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: make test
        working-directory: packages/daemon

  test-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
        working-directory: packages/portal
      - run: npm test
        working-directory: packages/portal

  test-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
        working-directory: packages/worker
      - run: npm test
        working-directory: packages/worker
